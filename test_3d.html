<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background: #222;
    padding: 100px;
  }
  .grid {
    transform: translateY(10%) rotateX(25deg) rotateZ(-45deg);
    transform-style: preserve-3d;
    display: flex;
    gap: 20px;
  }
  .tile {
    width: 76px;
    height: 76px;
    background: #205f6a;
    border: 1px solid #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateZ(10px);
    /* transform-style: preserve-3d; */
  }
  .tile.with-3d {
    transform-style: preserve-3d;
  }
  .art {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transform-style: preserve-3d;
    transform: translateZ(28px);
  }
  .art svg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotateZ(45deg) rotateX(-25deg) translateZ(10px);
    width: 50px;
    height: 50px;
    background: rgba(255,0,0,0.5);
  }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile">
      <div class="art">
        <svg></svg>
      </div>
    </div>
    <div class="tile with-3d">
      <div class="art">
        <svg></svg>
      </div>
    </div>
  </div>
</body>
</html>
