<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tile Path Game</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #131d33;
      --panel-2: #1a2744;
      --text: #eef4ff;
      --muted: #a7b6d6;
      --accent: #7c9bff;
      --danger: #ff6b6b;
      --grid: #2a3e66;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 20% -10%, #1a2b52, #0b1220 60%);
      color: var(--text);
      min-height: 100vh;
    }
    .main-shell {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      min-height: 100vh;
      gap: 16px;
      padding: 16px;
    }
    .app-nav {
      background: linear-gradient(180deg, #101722, #0c131e);
      border: 1px solid #2b3448;
      border-radius: 14px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: sticky;
      top: 16px;
      height: calc(100vh - 32px);
    }
    .app-nav-title {
      font-size: 26px;
      font-weight: 700;
      color: #f4f8ff;
      margin: 6px 8px 14px;
    }
    .app-nav-btn {
      border: 1px solid #29354f;
      background: #151d2b;
      color: #e8f0ff;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 18px;
      text-align: left;
      transition: background .12s ease, border-color .12s ease;
    }
    .app-nav-btn:hover {
      background: #1b2639;
      border-color: #39527f;
    }
    .app-nav-btn.active {
      background: #223450;
      border-color: #64d17b;
      box-shadow: inset 4px 0 0 #64d17b;
    }
    .tab-panel { min-width: 0; }
    .tutorial-panel {
      max-width: 1400px;
      margin: 0 auto;
      padding: 22px;
      min-height: 420px;
    }
    .chess-tutorial-shell {
      width: min(100%, 430px);
      margin: 10px auto 0;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #2a3b62;
      background: linear-gradient(180deg, #1a232e 0%, #0f212f 72%, #0f4d60 100%);
      box-shadow: 0 20px 44px rgba(0, 0, 0, .35);
    }
    .chess-tutorial-board {
      position: relative;
      height: 410px;
      overflow: hidden;
      background:
        radial-gradient(120% 100% at 30% -5%, rgba(80, 95, 116, .18), transparent 42%),
        linear-gradient(180deg, rgba(255, 255, 255, .03), transparent 42%);
    }
    .lesson-tile {
      position: absolute;
      width: 84px;
      height: 84px;
      border-radius: 16px;
      transform: translate(-50%, -50%) rotate(45deg);
      background: linear-gradient(145deg, #205f6a, #184953);
      border: 1px solid rgba(90, 179, 196, .35);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .06), 0 12px 16px rgba(0, 0, 0, .25);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lesson-tile-art {
      transform: rotate(-45deg);
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      user-select: none;
    }
    .lesson-tile-art svg {
      width: 50px;
      height: 50px;
      opacity: .8;
    }
    .lesson-tile.active {
      background: linear-gradient(145deg, #5ef0da, #33b9b5);
      border-color: rgba(139, 255, 241, .9);
      box-shadow: 0 0 34px rgba(96, 255, 231, .65), 0 16px 24px rgba(0, 0, 0, .3);
    }
    .lesson-piece {
      position: absolute;
      width: 54px;
      height: 54px;
      border-radius: 999px;
      background: rgba(16, 31, 41, .85);
      border: 1px solid rgba(130, 193, 207, .5);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 14px rgba(0, 0, 0, .3);
      user-select: none;
      pointer-events: none;
    }
    .lesson-piece svg {
      width: 40px;
      height: 40px;
      opacity: .95;
    }
    .next-chip {
      position: absolute;
      left: 32px;
      bottom: 36px;
      border: 0;
      cursor: pointer;
      background: #f0f2f5;
      color: #2f333a;
      font-size: 38px;
      font-weight: 800;
      border-radius: 13px;
      width: 124px;
      height: 84px;
      box-shadow: 0 0 18px rgba(238, 255, 198, .75), 0 10px 20px rgba(0, 0, 0, .3);
      line-height: 1;
    }
    .next-chip::after {
      content: "";
      position: absolute;
      left: 44px;
      bottom: -16px;
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 16px solid #f0f2f5;
      filter: drop-shadow(0 4px 4px rgba(0, 0, 0, .25));
    }
    .tutorial-content {
      padding: 18px 24px 24px;
      background: linear-gradient(180deg, rgba(16, 31, 41, .25), rgba(7, 23, 34, .7));
    }
    .tutorial-title {
      font-size: 48px;
      letter-spacing: .2px;
      margin: 0;
    }
    .tutorial-step {
      margin: 6px 0 18px;
      color: #ceecf7;
      font-size: 20px;
      font-weight: 600;
    }
    .tutorial-actions {
      display: grid;
      grid-template-columns: 122px 1fr;
      gap: 14px;
      margin-top: 10px;
    }
    .tutorial-list-btn {
      border: 0;
      border-radius: 16px;
      background: linear-gradient(180deg, #314854, #223745);
      color: #d8edf6;
      font-size: 42px;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .08), 0 8px 18px rgba(0, 0, 0, .28);
      padding-bottom: 7px;
    }
    .tutorial-next-btn {
      border: 0;
      border-radius: 16px;
      background: linear-gradient(180deg, #85c74e, #6ead3e);
      color: #f5ffe8;
      font-size: 40px;
      font-weight: 900;
      text-shadow: 0 2px 0 rgba(0, 0, 0, .25);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .22), 0 8px 18px rgba(0, 0, 0, .3);
      line-height: 1;
      padding: 14px 12px;
    }
    .tutorial-lesson-list {
      margin-top: 14px;
      border-radius: 12px;
      border: 1px solid rgba(146, 205, 222, .3);
      background: rgba(14, 31, 43, .75);
      overflow: hidden;
    }
    .tutorial-lesson-item {
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(146, 205, 222, .25);
      background: transparent;
      color: #dff4fb;
      text-align: left;
      font-size: 18px;
      padding: 12px 14px;
      cursor: pointer;
    }
    .tutorial-lesson-item:last-child { border-bottom: 0; }
    .tutorial-lesson-item.active {
      background: rgba(94, 240, 218, .18);
      color: #f1fffe;
      font-weight: 700;
    }
    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0;
    }
    .card {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid #2a3b62;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }
    .setup {
      max-width: 860px;
      margin: 40px auto;
      padding: 22px;
    }
    h1, h2, h3 { margin: 0; }
    .sub { color: var(--muted); margin: 8px 0 18px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .field label { font-weight: 600; font-size: 14px; color: #dbe7ff; }
    select, input[type="text"], button {
      border: 1px solid #3b5283;
      background: #0f1830;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }
    button {
      cursor: pointer;
      background: linear-gradient(180deg, #28427e, #1f3568);
      border-color: #4566a4;
      font-weight: 600;
    }
    button:hover { filter: brightness(1.08); }
    .hidden { display: none !important; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      border: 1px solid #446096;
      background: #101b35;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: #cde0ff;
    }
    .game {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 14px;
      margin-top: 10px;
    }
    .board-wrap {
      padding: 12px;
      overflow: auto;
    }
    .board-stack {
      position: relative;
      width: max-content;
      margin: 0 auto;
    }
    .board {
      display: grid;
      gap: 0;
      background: var(--grid);
      border: 1px solid #3a5185;
      border-radius: 10px;
      padding: 1px;
      width: max-content;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }
    .trail-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }
    .cell {
      width: 60px;
      height: 60px;
      background: #0d1730;
      position: relative;
      cursor: pointer;
      border: none;
      box-shadow: inset 0 0 0 1px #2a3f69;
      padding: 0;
    }
    .cell.valid { outline: 2px solid #58e2a9; outline-offset: -2px; }
    .cell.invalid { cursor: not-allowed; }
    .cell.dead {
      background:
        linear-gradient(45deg, transparent 45%, #b83f4e 45%, #b83f4e 55%, transparent 55%),
        linear-gradient(-45deg, transparent 45%, #b83f4e 45%, #b83f4e 55%, transparent 55%),
        #251226;
    }
    .cell.start { background: #16233f; }
    .start-p1 { box-shadow: inset 0 0 0 2px #ff5a6f; }
    .start-p2 { box-shadow: inset 0 0 0 2px #5aa0ff; }
    .start-p3 { box-shadow: inset 0 0 0 2px #59d37e; }
    .start-p4 { box-shadow: inset 0 0 0 2px #ffd65a; }
    .tile-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .token.p1 { background: #ff5a6f; }
    .token.p2 { background: #5aa0ff; }
    .token.p3 { background: #59d37e; }
    .token.p4 { background: #ffd65a; }
    .game-sidebar {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .panel {
      padding: 12px;
      border: 1px solid #3b5387;
      border-radius: 10px;
      background: #0f1a34;
    }
    .panel h3 {
      font-size: 14px;
      margin-bottom: 8px;
      color: #dce8ff;
    }
    .status { font-size: 13px; color: #d1e0ff; line-height: 1.4; }
    .status strong { color: #fff; }
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .tile-btn {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
      padding: 8px 6px;
      font-size: 12px;
      min-height: 84px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .tile-btn.selected { outline: 2px solid #7eb4ff; }
    .tile-btn:disabled { opacity: .45; cursor: not-allowed; }
    .drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      opacity: .85;
      background: rgba(19, 29, 51, .92);
      border: 2px solid #7eb4ff;
      border-radius: 8px;
      padding: 4px;
      transform: translate(-50%, -50%);
    }
    .cell.drag-hover { outline: 3px solid #7eb4ff; outline-offset: -3px; }
    .rot-row, .entry-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .rot-btn, .entry-btn { padding: 6px 8px; font-size: 12px; }
    .selected-tile-preview {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #365184;
      border-radius: 10px;
      background: #0b152d;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 140px;
    }
    .selected-tile-note {
      margin-top: 6px;
      font-size: 12px;
      color: #9cb6e9;
      line-height: 1.35;
    }
    .log {
      max-height: 180px;
      overflow: auto;
      border: 1px solid #2f4777;
      border-radius: 8px;
      padding: 8px;
      background: #0c162c;
      font-size: 12px;
      color: #c9dafd;
      line-height: 1.35;
      white-space: pre-wrap;
    }
    .winner {
      font-size: 14px;
      font-weight: 700;
      color: #ffe38a;
    }
    .elimination-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(80, 10, 10, .55);
      backdrop-filter: blur(6px);
    }
    .elimination-box {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 2px solid var(--danger);
      border-radius: 18px;
      padding: 44px 64px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
      animation: elimPop .25s ease-out;
    }
    @keyframes elimPop {
      from { transform: scale(.85); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .elimination-box h2 {
      font-size: 28px;
      color: var(--danger);
      margin: 0 0 28px;
    }
    .elimination-box button {
      padding: 12px 48px;
      font-size: 16px;
      border-radius: 12px;
    }
    .win-overlay {
      background: rgba(14, 90, 34, .58);
    }
    .win-box {
      border-color: #4ecf78;
    }
    .win-box h2 {
      color: #7ef3a2;
    }
    @media (max-width: 1120px) {
      .game { grid-template-columns: 1fr; }
    }
    @media (max-width: 900px) {
      .main-shell {
        grid-template-columns: 1fr;
      }
      .app-nav {
        position: static;
        height: auto;
      }
      .chess-tutorial-board { height: 360px; }
      .tutorial-title { font-size: 42px; }
      .tutorial-step { font-size: 18px; }
      .next-chip {
        width: 102px;
        height: 74px;
        font-size: 30px;
      }
      .tutorial-next-btn { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div class="main-shell">
    <aside class="app-nav">
      <div class="app-nav-title">Menu</div>
      <button id="tabPlayBtn" class="app-nav-btn active" type="button">Play</button>
      <button id="tabTutorialBtn" class="app-nav-btn" type="button">Tutorial</button>
    </aside>
    <div class="tab-panel-wrap">
      <div id="playTabPanel" class="tab-panel">
        <div class="app">
          <div id="setupView" class="setup card">
            <h1>Tile Path Game</h1>
            <p class="sub">Pass-and-play strategy game with path tiles, jump pads, and elimination traps.</p>
            <div class="grid-2">
              <div class="field">
                <label for="boardSize">Board Size</label>
                <select id="boardSize">
                  <option value="7">7 × 7</option>
                  <option value="13" selected>13 × 13</option>
                </select>
              </div>
              <div class="field">
                <label for="playerCount">Players</label>
                <select id="playerCount">
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4" selected>4</option>
                </select>
              </div>
            </div>
            <div id="threePlayerCornerField" class="field hidden" style="margin-top: 12px;">
              <label for="deadCornerSelect">3-player mode: choose dead corner</label>
              <select id="deadCornerSelect">
                <option value="0">Top-left</option>
                <option value="1">Top-right</option>
                <option value="2">Bottom-right</option>
                <option value="3" selected>Bottom-left</option>
              </select>
            </div>
            <div class="field" style="margin-top: 12px;">
              <label for="jumpSelection">Jump Pad Selection</label>
              <select id="jumpSelection">
                <option value="cardinal">Cardinal jump only</option>
                <option value="diagonal">Diagonal jump only</option>
                <option value="both" selected>Both</option>
                <option value="none">Neither</option>
              </select>
            </div>
            <div id="bothPoolField" class="field" style="margin-top: 12px;">
              <label for="poolMode">Both enabled: pool mode</label>
              <select id="poolMode">
                <option value="combined">Combined pool</option>
                <option value="separate" selected>Separate pools (2 each)</option>
              </select>
            </div>
            <div class="grid-2" style="margin-top: 12px;">
              <div class="field"><label for="p1Name">Player 1</label><input id="p1Name" type="text" value="Player 1"></div>
              <div class="field"><label for="p2Name">Player 2</label><input id="p2Name" type="text" value="Player 2"></div>
              <div class="field"><label for="p3Name">Player 3</label><input id="p3Name" type="text" value="Player 3"></div>
              <div class="field"><label for="p4Name">Player 4</label><input id="p4Name" type="text" value="Player 4"></div>
            </div>
            <div style="display:flex;justify-content:flex-end;margin-top:16px;">
              <button id="startBtn">Start Game</button>
            </div>
          </div>

          <div id="eliminationOverlay" class="elimination-overlay hidden">
            <div class="elimination-box">
              <h2 id="elimText"></h2>
              <button id="elimOkBtn">OK</button>
            </div>
          </div>
          <div id="winOverlay" class="elimination-overlay win-overlay hidden">
            <div class="elimination-box win-box">
              <h2 id="winText"></h2>
              <button id="winOkBtn">OK</button>
            </div>
          </div>

          <div id="gameView" class="hidden">
            <div class="chip-row" id="headerChips"></div>
            <div class="game">
              <div class="board-wrap card">
                <div class="board-stack">
                  <svg id="trailLayer" class="trail-layer"></svg>
                  <div id="board" class="board"></div>
                </div>
              </div>
              <div class="game-sidebar card">
                <div class="panel">
                  <h3>Game Status</h3>
                  <div id="statusText" class="status"></div>
                  <div id="winnerText" class="winner hidden"></div>
                </div>
                <div class="panel">
                  <h3>Tile Selection</h3>
                  <div id="tileGrid" class="tile-grid"></div>
                  <div style="margin-top:8px;">
                    <div style="font-size:12px;color:#c5d5f9;margin-bottom:6px;">Rotation</div>
                    <div id="rotRow" class="rot-row"></div>
                  </div>
                  <div class="selected-tile-preview" id="selectedTilePreview"></div>
                  <div class="selected-tile-note" id="selectedTileNote">Dots show tile entrances.</div>
                  <div id="entrySelectWrap" class="hidden" style="margin-top:8px;">
                    <div style="font-size:12px;color:#ffdba8;margin-bottom:6px;">Step 2: choose the entry on the side touching your base</div>
                    <div id="entryRow" class="entry-row"></div>
                  </div>
                </div>
                <div class="panel">
                  <h3>Players</h3>
                  <div id="playersText" class="status"></div>
                </div>
                <div class="panel">
                  <h3>Action Log</h3>
                  <div id="log" class="log"></div>
                </div>
                <div style="display:flex; gap:8px;">
                  <button id="newGameBtn">New Game</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="tutorialTabPanel" class="tab-panel hidden">
        <div class="tutorial-panel card">
          <h2>Tutorial</h2>
          <div class="chess-tutorial-shell">
            <div class="chess-tutorial-board">
              <div class="lesson-tile active" style="left: 22%; top: 18%;" data-tile-type="straightaway" data-tile-rot="0"><div class="lesson-tile-art"></div></div>
              <div class="lesson-tile" style="left: 41%; top: 18%;" data-tile-type="uturn" data-tile-rot="1"><div class="lesson-tile-art"></div></div>
              <div class="lesson-tile" style="left: 60%; top: 18%;" data-tile-type="centrifugal" data-tile-rot="2"><div class="lesson-tile-art"></div></div>
              <div class="lesson-tile" style="left: 32%; top: 35%;" data-tile-type="diagonal" data-tile-rot="0"><div class="lesson-tile-art"></div></div>
              <div class="lesson-tile" style="left: 51%; top: 35%;" data-tile-type="weave" data-tile-rot="1"><div class="lesson-tile-art"></div></div>
              <div class="lesson-tile" style="left: 70%; top: 35%;" data-tile-type="jump" data-tile-rot="2"><div class="lesson-tile-art"></div></div>
              <div class="lesson-tile" style="left: 41%; top: 52%;" data-tile-type="diagonalJump" data-tile-rot="0"><div class="lesson-tile-art"></div></div>
              <div class="lesson-tile" style="left: 60%; top: 52%;" data-tile-type="straightaway" data-tile-rot="1"><div class="lesson-tile-art"></div></div>
              <div class="lesson-tile" style="left: 32%; top: 69%;" data-tile-type="uturn" data-tile-rot="3"><div class="lesson-tile-art"></div></div>

              <div class="lesson-piece" style="left: 70%; top: 18%;" data-piece-tile="jump" data-piece-rot="1"></div>
              <div class="lesson-piece" style="left: 22%; top: 53%;" data-piece-tile="uturn" data-piece-rot="2"></div>
              <div class="lesson-piece" style="left: 69%; top: 67%;" data-piece-tile="diagonalJump" data-piece-rot="3"></div>
              <div class="lesson-piece" style="left: 21%; top: 78%;" data-piece-tile="weave" data-piece-rot="0"></div>

              <button id="tutorialBubbleBtn" class="next-chip" type="button">Next</button>
            </div>
            <div class="tutorial-content">
              <h3 class="tutorial-title">Learn To Play</h3>
              <div id="tutorialStepText" class="tutorial-step"></div>
              <div class="tutorial-actions">
                <button id="tutorialListBtn" class="tutorial-list-btn" type="button">☰</button>
                <button id="tutorialNextBtn" class="tutorial-next-btn" type="button">Start<br>Lesson</button>
              </div>
              <div id="tutorialLessonList" class="tutorial-lesson-list hidden"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const COLORS = ["p1", "p2", "p3", "p4"];
    const CORNERS = ["TL", "TR", "BR", "BL"];
    const DEAD_ZONES_13 = new Set([
      "3,6","4,4","4,8","5,5","5,7","6,3","6,6","6,9","7,5","7,7","8,4","8,8","9,6"
    ]);
    const DEAD_ZONES_7 = new Set(["2,2","2,4","3,3","4,2","4,4"]);
    const BOARD_CELL_SIZE = 60;
    const BOARD_CELL_GAP = 0;
    const BOARD_FRAME = 2; // 1px border + 1px padding on each side

    const BASE_TILE_DEFS = {
      straightaway: [[0,5],[1,4],[2,7],[3,6]],
      uturn: [[0,1],[2,3],[4,5],[6,7]],
      centrifugal: [[0,7],[1,2],[3,4],[5,6]],
      diagonal: [[0,3],[1,6],[4,7],[5,2]],
      weave: [[0,4],[1,5],[2,6],[3,7]],
      jump: [[0,5],[1,4],[2,7],[3,6]],
      diagonalJump: [[0,3],[1,6],[4,7],[5,2]],
    };

    const TILE_LABELS = {
      straightaway: "Straight",
      uturn: "U-Turn",
      centrifugal: "Centrifugal",
      diagonal: "Diagonal",
      weave: "Weave",
      jump: "Jump",
      diagonalJump: "Diag Jump",
    };

    const app = {
      config: null,
      board: [],
      players: [],
      currentPlayerIdx: 0,
      selectedTile: "straightaway",
      selectedRot: 0,
      gameOver: false,
      winner: null,
      pendingFirstPlacement: null,
      logs: [],
      drag: { active: false, tileType: null, ghost: null, hoveredCell: null },
      eliminationQueue: [],
      winShown: false,
    };

    const el = {
      setupView: document.getElementById("setupView"),
      gameView: document.getElementById("gameView"),
      board: document.getElementById("board"),
      trailLayer: document.getElementById("trailLayer"),
      statusText: document.getElementById("statusText"),
      winnerText: document.getElementById("winnerText"),
      playersText: document.getElementById("playersText"),
      tileGrid: document.getElementById("tileGrid"),
      rotRow: document.getElementById("rotRow"),
      selectedTilePreview: document.getElementById("selectedTilePreview"),
      selectedTileNote: document.getElementById("selectedTileNote"),
      entrySelectWrap: document.getElementById("entrySelectWrap"),
      entryRow: document.getElementById("entryRow"),
      log: document.getElementById("log"),
      headerChips: document.getElementById("headerChips"),
      boardSize: document.getElementById("boardSize"),
      playerCount: document.getElementById("playerCount"),
      deadCornerSelect: document.getElementById("deadCornerSelect"),
      threePlayerCornerField: document.getElementById("threePlayerCornerField"),
      jumpSelection: document.getElementById("jumpSelection"),
      poolMode: document.getElementById("poolMode"),
      bothPoolField: document.getElementById("bothPoolField"),
      p1Name: document.getElementById("p1Name"),
      p2Name: document.getElementById("p2Name"),
      p3Name: document.getElementById("p3Name"),
      p4Name: document.getElementById("p4Name"),
      startBtn: document.getElementById("startBtn"),
      newGameBtn: document.getElementById("newGameBtn"),
      eliminationOverlay: document.getElementById("eliminationOverlay"),
      elimText: document.getElementById("elimText"),
      elimOkBtn: document.getElementById("elimOkBtn"),
      winOverlay: document.getElementById("winOverlay"),
      winText: document.getElementById("winText"),
      winOkBtn: document.getElementById("winOkBtn"),
      tabPlayBtn: document.getElementById("tabPlayBtn"),
      tabTutorialBtn: document.getElementById("tabTutorialBtn"),
      playTabPanel: document.getElementById("playTabPanel"),
      tutorialTabPanel: document.getElementById("tutorialTabPanel"),
      tutorialBubbleBtn: document.getElementById("tutorialBubbleBtn"),
      tutorialNextBtn: document.getElementById("tutorialNextBtn"),
      tutorialListBtn: document.getElementById("tutorialListBtn"),
      tutorialStepText: document.getElementById("tutorialStepText"),
      tutorialLessonList: document.getElementById("tutorialLessonList"),
    };
    const tutorialLessons = [
      { title: "Board, Bases, and Dead Zones", step: "Lesson 1 of 6" },
      { title: "First-Turn Placement", step: "Lesson 2 of 6" },
      { title: "Path Following", step: "Lesson 3 of 6" },
      { title: "Jump Tile Basics", step: "Lesson 4 of 6" },
      { title: "Elimination Rules", step: "Lesson 5 of 6" },
      { title: "How To Win", step: "Lesson 6 of 6" },
    ];
    let tutorialLessonIndex = 0;

    function setTab(tabName) {
      const isPlay = tabName === "play";
      el.playTabPanel.classList.toggle("hidden", !isPlay);
      el.tutorialTabPanel.classList.toggle("hidden", isPlay);
      el.tabPlayBtn.classList.toggle("active", isPlay);
      el.tabTutorialBtn.classList.toggle("active", !isPlay);
    }

    function key(r, c) { return `${r},${c}`; }
    function inBounds(size, r, c) { return r >= 0 && c >= 0 && r < size && c < size; }
    function edgeDir(i) { if (i <= 1) return "N"; if (i <= 3) return "E"; if (i <= 5) return "S"; return "W"; }
    function stepCard(r, c, d) {
      if (d === "N") return [r - 1, c];
      if (d === "E") return [r, c + 1];
      if (d === "S") return [r + 1, c];
      return [r, c - 1];
    }
    function stepDiag(r, c, d) {
      if (d === "NE") return [r - 1, c + 1];
      if (d === "NW") return [r - 1, c - 1];
      if (d === "SE") return [r + 1, c + 1];
      return [r + 1, c - 1];
    }
    function oppositeEntrance(i) {
      const map = {0:5,1:4,2:7,3:6,4:1,5:0,6:3,7:2};
      return map[i];
    }
    function rotateIdx(i, rot) { return (i + rot * 2) % 8; }
    function unrotateIdx(i, rot) { return (i - rot * 2 + 16) % 8; }
    function rotateDiagDirection(dir, rot) {
      const arr = ["NE","SE","SW","NW"];
      return arr[(arr.indexOf(dir) + rot) % 4];
    }
    function getEntrancePoint(i) {
      const pts = {
        0:[.30,0],1:[.70,0],2:[1,.30],3:[1,.70],4:[.70,1],5:[.30,1],6:[0,.70],7:[0,.30]
      };
      return pts[i];
    }

    function setupBindings() {
      el.tabPlayBtn.addEventListener("click", () => setTab("play"));
      el.tabTutorialBtn.addEventListener("click", () => setTab("tutorial"));
      el.playerCount.addEventListener("change", () => {
        el.threePlayerCornerField.classList.toggle("hidden", el.playerCount.value !== "3");
      });
      el.jumpSelection.addEventListener("change", () => {
        el.bothPoolField.classList.toggle("hidden", el.jumpSelection.value !== "both");
      });
      el.startBtn.addEventListener("click", startGame);
      el.newGameBtn.addEventListener("click", () => {
        el.gameView.classList.add("hidden");
        el.setupView.classList.remove("hidden");
      });

      el.elimOkBtn.addEventListener("click", dismissElimination);
      el.winOkBtn.addEventListener("click", dismissWin);

      document.addEventListener("pointermove", onDragMove);
      document.addEventListener("pointerup", onDragEnd);
      document.addEventListener("pointercancel", onDragEnd);

      if (el.tutorialBubbleBtn && el.tutorialNextBtn && el.tutorialListBtn) {
        el.tutorialBubbleBtn.addEventListener("click", cycleTutorialLesson);
        el.tutorialNextBtn.addEventListener("click", startTutorialLesson);
        el.tutorialListBtn.addEventListener("click", () => {
          el.tutorialLessonList.classList.toggle("hidden");
        });
      }
    }

    function cycleTutorialLesson() {
      tutorialLessonIndex = (tutorialLessonIndex + 1) % tutorialLessons.length;
      renderTutorialCard();
    }

    function renderTutorialCard() {
      if (!el.tutorialStepText || !el.tutorialLessonList) return;
      const lesson = tutorialLessons[tutorialLessonIndex];
      el.tutorialStepText.textContent = `${lesson.step} - ${lesson.title}`;
      renderTutorialVisuals();

      el.tutorialLessonList.innerHTML = tutorialLessons.map((item, idx) =>
        `<button class="tutorial-lesson-item ${idx === tutorialLessonIndex ? "active" : ""}" data-lesson-idx="${idx}" type="button">${item.step}: ${item.title}</button>`
      ).join("");

      el.tutorialLessonList.querySelectorAll(".tutorial-lesson-item").forEach((btn) => {
        btn.addEventListener("click", () => {
          tutorialLessonIndex = Number(btn.dataset.lessonIdx) || 0;
          renderTutorialCard();
          el.tutorialLessonList.classList.add("hidden");
        });
      });
    }

    function renderTutorialVisuals() {
      const tiles = document.querySelectorAll(".lesson-tile");
      tiles.forEach((tileEl, idx) => {
        tileEl.classList.toggle("active", idx === tutorialLessonIndex);
        const tileType = tileEl.dataset.tileType || "straightaway";
        const tileRot = Number(tileEl.dataset.tileRot || 0);
        const art = tileEl.querySelector(".lesson-tile-art");
        if (!art) return;
        art.innerHTML = tileSvg({ type: tileType, rot: tileRot }, 50, {
          showEntrances: idx === tutorialLessonIndex,
        });
      });

      const pieces = document.querySelectorAll(".lesson-piece");
      pieces.forEach((pieceEl) => {
        const tileType = pieceEl.dataset.pieceTile || "weave";
        const tileRot = Number(pieceEl.dataset.pieceRot || 0);
        pieceEl.innerHTML = tileSvg({ type: tileType, rot: tileRot }, 40);
      });
    }

    function startTutorialLesson() {
      setTab("play");
      el.setupView.classList.remove("hidden");
      el.gameView.classList.add("hidden");
      el.threePlayerCornerField.classList.toggle("hidden", el.playerCount.value !== "3");
      el.bothPoolField.classList.toggle("hidden", el.jumpSelection.value !== "both");
    }

    function onDragStart(tileType, ev) {
      if (app.gameOver) return;
      ev.preventDefault();
      app.selectedTile = tileType;
      const ghost = document.createElement("div");
      ghost.className = "drag-ghost";
      ghost.innerHTML = tileSvg({ type: tileType, rot: app.selectedRot }, 48);
      document.body.appendChild(ghost);
      const x = ev.clientX, y = ev.clientY;
      ghost.style.left = x + "px";
      ghost.style.top = y + "px";
      app.drag = { active: true, tileType, ghost, hoveredCell: null };
    }

    function onDragMove(ev) {
      if (!app.drag.active) return;
      app.drag.ghost.style.left = ev.clientX + "px";
      app.drag.ghost.style.top = ev.clientY + "px";

      if (app.drag.hoveredCell) {
        app.drag.hoveredCell.classList.remove("drag-hover");
        app.drag.hoveredCell = null;
      }
      const target = document.elementFromPoint(ev.clientX, ev.clientY);
      if (target) {
        const cell = target.closest(".cell[data-rc]");
        if (cell && cell.classList.contains("valid")) {
          cell.classList.add("drag-hover");
          app.drag.hoveredCell = cell;
        }
      }
    }

    function onDragEnd(ev) {
      if (!app.drag.active) return;
      if (app.drag.ghost) app.drag.ghost.remove();
      if (app.drag.hoveredCell) app.drag.hoveredCell.classList.remove("drag-hover");

      const tileType = app.drag.tileType;
      const x = ev.clientX, y = ev.clientY;
      app.drag = { active: false, tileType: null, ghost: null, hoveredCell: null };
      if (app.gameOver) return;

      const target = document.elementFromPoint(x, y);
      if (!target) return;
      const cell = target.closest(".cell[data-rc]");
      if (!cell || !cell.classList.contains("valid")) return;
      const [r, c] = cell.dataset.rc.split(",").map(Number);
      attemptPlaceAtCell(r, c, tileType);
    }

    function getBaseCells(size, corner) {
      const is13 = size === 13;
      if (!is13) {
        const map = { TL:[[0,0]], TR:[[0,6]], BR:[[6,6]], BL:[[6,0]] };
        return map[corner];
      }
      if (corner === "TL") return [[0,0],[0,1],[1,0],[1,1]];
      if (corner === "TR") return [[0,11],[0,12],[1,11],[1,12]];
      if (corner === "BR") return [[11,11],[11,12],[12,11],[12,12]];
      return [[11,0],[11,1],[12,0],[12,1]];
    }

    function getAdjacentToBase(size, corner) {
      if (size === 7) {
        const map = {
          TL:[[0,1],[1,0]],
          TR:[[0,5],[1,6]],
          BR:[[5,6],[6,5]],
          BL:[[5,0],[6,1]],
        };
        return map[corner];
      }
      const map = {
        TL:[[0,2],[1,2],[2,0],[2,1]],
        TR:[[0,10],[1,10],[2,11],[2,12]],
        BR:[[10,11],[10,12],[11,10],[12,10]],
        BL:[[10,0],[10,1],[11,2],[12,2]],
      };
      return map[corner];
    }

    function startGame() {
      const size = Number(el.boardSize.value);
      const playerCount = Number(el.playerCount.value);
      const jumpSelection = el.jumpSelection.value;
      const poolMode = el.poolMode.value;
      const names = [el.p1Name.value, el.p2Name.value, el.p3Name.value, el.p4Name.value];

      const activeCorners = [];
      let deadCorner = null;
      if (playerCount === 2) {
        activeCorners.push("TL", "BR");
      } else if (playerCount === 3) {
        deadCorner = Number(el.deadCornerSelect.value);
        CORNERS.forEach((c, i) => { if (i !== deadCorner) activeCorners.push(c); });
      } else {
        activeCorners.push(...CORNERS);
      }

      app.config = { size, playerCount, jumpSelection, poolMode, activeCorners };
      app.board = Array.from({ length: size }, (_, r) =>
        Array.from({ length: size }, (_, c) => ({ r, c, tile: null, dead: false, startOwner: null }))
      );
      app.players = [];
      app.currentPlayerIdx = 0;
      app.selectedTile = "straightaway";
      app.selectedRot = 0;
      app.pendingFirstPlacement = null;
      app.logs = [];
      app.gameOver = false;
      app.winner = null;
      app.eliminationQueue = [];
      app.winShown = false;
      el.eliminationOverlay.classList.add("hidden");
      el.winOverlay.classList.add("hidden");

      const interior = size === 13 ? DEAD_ZONES_13 : DEAD_ZONES_7;
      for (const k of interior) {
        const [r, c] = k.split(",").map(Number);
        app.board[r][c].dead = true;
      }

      CORNERS.forEach((corner, i) => {
        const cells = getBaseCells(size, corner);
        const isActive = activeCorners.includes(corner);
        for (const [r, c] of cells) {
          if (isActive) app.board[r][c].startOwner = activeCorners.indexOf(corner);
          else app.board[r][c].dead = true;
        }
      });

      activeCorners.forEach((corner, i) => {
        const limitSingle = size === 13 ? 4 : 3;
        const p = {
          id: i,
          name: names[i] || `Player ${i + 1}`,
          color: COLORS[i],
          corner,
          baseCells: getBaseCells(size, corner),
          adjacentFirst: getAdjacentToBase(size, corner),
          row: null,
          col: null,
          entrance: null,
          alive: true,
          hasPlacedFirstTile: false,
          jumpLeft: 0,
          diagonalJumpLeft: 0,
          combinedJumpLeft: 0,
          trail: [],
        };
        if (jumpSelection === "cardinal") p.jumpLeft = limitSingle;
        if (jumpSelection === "diagonal") p.diagonalJumpLeft = limitSingle;
        if (jumpSelection === "both") {
          if (poolMode === "combined") p.combinedJumpLeft = limitSingle;
          else { p.jumpLeft = 2; p.diagonalJumpLeft = 2; }
        }
        app.players.push(p);
      });

      log(`Game started: ${size}×${size}, ${playerCount} players, jump mode "${jumpSelection}".`);
      el.setupView.classList.add("hidden");
      el.gameView.classList.remove("hidden");
      renderAll();
    }

    function log(msg) {
      app.logs.unshift(`${new Date().toLocaleTimeString()}  ${msg}`);
      if (app.logs.length > 80) app.logs.pop();
    }

    function currentPlayer() { return app.players[app.currentPlayerIdx]; }

    function getRotatedPairs(tileType, rot) {
      return BASE_TILE_DEFS[tileType].map(([a, b]) => [rotateIdx(a, rot), rotateIdx(b, rot)]);
    }

    function getExitEntrance(tile, entry) {
      const pairs = getRotatedPairs(tile.type, tile.rot);
      for (const [a, b] of pairs) {
        if (a === entry) return b;
        if (b === entry) return a;
      }
      return null;
    }

    function getForwardCell(row, col, entrance) {
      const d = edgeDir(entrance);
      return stepCard(row, col, d);
    }

    function getEntranceOfNeighbor(exitEntrance) {
      return oppositeEntrance(exitEntrance);
    }

    function playerOwnsBaseCell(player, r, c) {
      return player.baseCells.some(([br, bc]) => br === r && bc === c);
    }
    function inAnyOpponentBase(player, r, c) {
      return app.players.some(p => p.id !== player.id && p.alive && p.baseCells.some(([br, bc]) => br === r && bc === c));
    }

    function canUseTile(player, tileType) {
      if (tileType !== "jump" && tileType !== "diagonalJump") return true;
      const js = app.config.jumpSelection;
      if (js === "none") return false;
      if (js === "cardinal") return tileType === "jump" && player.jumpLeft > 0;
      if (js === "diagonal") return tileType === "diagonalJump" && player.diagonalJumpLeft > 0;
      if (js === "both") {
        if (app.config.poolMode === "combined") return player.combinedJumpLeft > 0;
        return tileType === "jump" ? player.jumpLeft > 0 : player.diagonalJumpLeft > 0;
      }
      return false;
    }

    function consumeTile(player, tileType) {
      if (tileType !== "jump" && tileType !== "diagonalJump") return;
      const js = app.config.jumpSelection;
      if (js === "cardinal") player.jumpLeft--;
      else if (js === "diagonal") player.diagonalJumpLeft--;
      else if (js === "both") {
        if (app.config.poolMode === "combined") player.combinedJumpLeft--;
        else if (tileType === "jump") player.jumpLeft--;
        else player.diagonalJumpLeft--;
      }
    }

    function validFirstTurnCells(player) {
      return player.adjacentFirst.filter(([r, c]) => inBounds(app.config.size, r, c) &&
        !app.board[r][c].dead && app.board[r][c].startOwner == null && app.board[r][c].tile == null);
    }

    function validSubsequentCell(player) {
      // Players rest on a blank cell entrance; subsequent placement occurs on that same blank cell.
      const r = player.row;
      const c = player.col;
      if (!inBounds(app.config.size, r, c)) return null;
      const cell = app.board[r][c];
      if (cell.dead || cell.startOwner != null || cell.tile != null) return null;
      return [r, c];
    }

    function getFirstTurnEntryChoices(player, tileR, tileC) {
      const result = [];
      for (let i = 0; i < 8; i++) {
        const d = edgeDir(i);
        const [nr, nc] = stepCard(tileR, tileC, d);
        if (playerOwnsBaseCell(player, nr, nc)) result.push(i);
      }
      return result;
    }

    function attemptPlaceAtCell(r, c, tileType) {
      if (app.gameOver) return;
      const p = currentPlayer();
      if (!p || !p.alive) return;
      if (!canUseTile(p, tileType)) return;

      if (!p.hasPlacedFirstTile) {
        const valid = validFirstTurnCells(p).some(([vr, vc]) => vr === r && vc === c);
        if (!valid) return;
        app.pendingFirstPlacement = { r, c };
        const entries = getFirstTurnEntryChoices(p, r, c);
        log(`${p.name} first move: now choose one of the entry points touching your base.`);
        renderEntryChoices(entries, (entry) => {
          if (app.gameOver) return;
          placeTile(r, c, tileType, app.selectedRot);
          consumeTile(p, tileType);
          executeFirstTurnMovement(p, r, c, entry);
          p.hasPlacedFirstTile = true;
          app.pendingFirstPlacement = null;
          el.entrySelectWrap.classList.add("hidden");
          postTurnAdvance();
        });
        return;
      }

      const valid = validSubsequentCell(p);
      if (!valid || valid[0] !== r || valid[1] !== c) return;

      placeTile(r, c, tileType, app.selectedRot);
      consumeTile(p, tileType);
      resolveAfterPlacement(r, c);
      postTurnAdvance();
    }

    function onCellClick(r, c) {
      attemptPlaceAtCell(r, c, app.selectedTile);
    }

    function placeTile(r, c, type, rot) {
      app.board[r][c].tile = { type, rot };
      log(`${currentPlayer().name} placed ${TILE_LABELS[type]} (${rot * 90}°) at (${r},${c}).`);
    }

    function appendTrailPoint(player, point) {
      const last = player.trail[player.trail.length - 1];
      if (last && last.row === point.row && last.col === point.col && last.ax === point.ax && last.ay === point.ay) return;
      player.trail.push(point);
    }

    function getUTurnControlPoint(entry, exit) {
      const [x1, y1] = getEntrancePoint(entry);
      const [x2, y2] = getEntrancePoint(exit);
      const edge = edgeDir(entry);
      if (edge === "N") return { ax: (x1 + x2) / 2, ay: 0.26 };
      if (edge === "S") return { ax: (x1 + x2) / 2, ay: 0.74 };
      if (edge === "E") return { ax: 0.74, ay: (y1 + y2) / 2 };
      return { ax: 0.26, ay: (y1 + y2) / 2 };
    }

    function appendUTurnCurve(player, row, col, entry, exit) {
      const [sx, sy] = getEntrancePoint(entry);
      const [ex, ey] = getEntrancePoint(exit);
      const cp = getUTurnControlPoint(entry, exit);
      appendTrailPoint(player, { row, col, ax: sx, ay: sy });
      [0.25, 0.5, 0.75].forEach((t) => {
        const mt = 1 - t;
        const ax = mt * mt * sx + 2 * mt * t * cp.ax + t * t * ex;
        const ay = mt * mt * sy + 2 * mt * t * cp.ay + t * t * ey;
        appendTrailPoint(player, { row, col, ax, ay });
      });
      appendTrailPoint(player, { row, col, ax: ex, ay: ey });
    }

    function appendMovementPath(player, fromR, fromC, entry, exit, toR, toC, toEntrance, tileType) {
      const [toAx, toAy] = getEntrancePoint(toEntrance);
      if (tileType === "uturn") {
        appendUTurnCurve(player, fromR, fromC, entry, exit);
      } else {
        const [fromAx, fromAy] = getEntrancePoint(entry);
        const [exitAx, exitAy] = getEntrancePoint(exit);
        appendTrailPoint(player, { row: fromR, col: fromC, ax: fromAx, ay: fromAy });
        appendTrailPoint(player, { row: fromR, col: fromC, ax: exitAx, ay: exitAy });
      }
      appendTrailPoint(player, { row: toR, col: toC, ax: toAx, ay: toAy });
    }

    function appendExitOnlyPath(player, row, col, entry, exit, tileType) {
      if (tileType === "uturn") {
        appendUTurnCurve(player, row, col, entry, exit);
      } else {
        const [fromAx, fromAy] = getEntrancePoint(entry);
        const [exitAx, exitAy] = getEntrancePoint(exit);
        appendTrailPoint(player, { row, col, ax: fromAx, ay: fromAy });
        appendTrailPoint(player, { row, col, ax: exitAx, ay: exitAy });
      }
    }

    function executeFirstTurnMovement(player, tileR, tileC, entry) {
      let curR = tileR, curC = tileC, curEntry = entry;
      const tile = app.board[curR][curC].tile;
      const exit = getExitEntrance(tile, curEntry);
      const next = jumpOrAdjacent(curR, curC, curEntry, exit, tile.type, tile.rot);
      player.trail = [];
      if (next.eliminated || next.win) appendExitOnlyPath(player, curR, curC, curEntry, exit, tile.type);
      else appendMovementPath(player, curR, curC, curEntry, exit, next.row, next.col, next.entrance, tile.type);
      if (next.eliminated) {
        eliminatePlayer(player, `${player.name} was eliminated on first move.`);
        return;
      }
      if (next.win) {
        setWinner(player.id);
        log(`${player.name} wins by reaching opponent base.`);
        return;
      }
      player.row = next.row;
      player.col = next.col;
      player.entrance = next.entrance;
      log(`${player.name} ends first turn at (${player.row},${player.col}) on entrance ${entranceName(player.entrance)}.`);
    }

    function resolveAfterPlacement(placedR, placedC) {
      const affected = app.players
        .filter(p => p.alive && p.hasPlacedFirstTile && p.row != null)
        .filter(p => {
          return p.row === placedR && p.col === placedC;
        })
        .sort((a, b) => a.id - b.id);

      for (const p of affected) {
        if (!p.alive || app.gameOver) continue;
        resolveMovement(p);
      }

      checkPositionDraw();
      if (app.gameOver) return;

      const alive = app.players.filter(p => p.alive);
      if (alive.length === 1) {
        setWinner(alive[0].id);
        log(`${alive[0].name} wins as last player alive.`);
      }
    }

    function resolveMovement(player) {
      const visited = new Set();
      while (true) {
        const stateK = `${player.row},${player.col},${player.entrance}`;
        if (visited.has(stateK)) {
          eliminatePlayer(player, `${player.name} got stuck in a loop and is eliminated.`);
          return;
        }
        visited.add(stateK);

        const cell = app.board[player.row][player.col];
        if (!cell.tile) return;

        const exit = getExitEntrance(cell.tile, player.entrance);
        const next = jumpOrAdjacent(player.row, player.col, player.entrance, exit, cell.tile.type, cell.tile.rot, player);
        if (next.eliminated || next.win) appendExitOnlyPath(player, player.row, player.col, player.entrance, exit, cell.tile.type);
        else appendMovementPath(player, player.row, player.col, player.entrance, exit, next.row, next.col, next.entrance, cell.tile.type);

        if (next.eliminated) {
          eliminatePlayer(player, `${player.name} was eliminated.`);
          return;
        }
        if (next.win) {
          setWinner(player.id);
          log(`${player.name} wins by reaching opponent base.`);
          return;
        }

        player.row = next.row;
        player.col = next.col;
        player.entrance = next.entrance;
        if (!app.board[player.row][player.col].tile) return;
      }
    }

    function jumpOrAdjacent(row, col, entry, exit, tileType, rot, playerRef = currentPlayer()) {
      const player = playerRef;
      const result = { eliminated: false, win: false, row: null, col: null, entrance: null };
      if (typeof exit !== "number") {
        result.eliminated = true;
        return result;
      }

      let nextRow, nextCol, nextEntrance;
      if (tileType === "jump") {
        const dir = edgeDir(exit);
        const [sr, sc] = stepCard(row, col, dir);
        const [lr, lc] = stepCard(sr, sc, dir);
        // Cardinal jump flies over the skipped cell; only landing cell is evaluated.
        if (isFatal(lr, lc, player)) { result.eliminated = true; return result; }
        if (isOpponentBaseCell(player, lr, lc)) { result.win = true; return result; }
        // Cardinal jumps preserve lane into the landing tile by entering from the opposite side of exit.
        nextRow = lr; nextCol = lc; nextEntrance = getEntranceOfNeighbor(exit);
      } else if (tileType === "diagonalJump") {
        const dir = getDiagonalDirection(entry, exit, rot);
        if (!dir) { result.eliminated = true; return result; }
        // Diagonal jump lands on the corner-touching diagonal tile.
        const [lr, lc] = stepDiag(row, col, dir);
        if (isFatal(lr, lc, player)) { result.eliminated = true; return result; }
        if (isOpponentBaseCell(player, lr, lc)) { result.win = true; return result; }
        nextRow = lr; nextCol = lc; nextEntrance = entry;
      } else {
        const d = edgeDir(exit);
        const [nr, nc] = stepCard(row, col, d);
        if (isFatal(nr, nc, player)) { result.eliminated = true; return result; }
        if (isOpponentBaseCell(player, nr, nc)) { result.win = true; return result; }
        nextRow = nr; nextCol = nc; nextEntrance = getEntranceOfNeighbor(exit);
      }
      result.row = nextRow;
      result.col = nextCol;
      result.entrance = nextEntrance;
      return result;
    }

    function getDiagonalDirection(entry, exit, rot) {
      const ue = unrotateIdx(entry, rot);
      const ux = unrotateIdx(exit, rot);
      const map = {
        "0-3":"SE","3-0":"NW","1-6":"SW","6-1":"NE",
        "5-2":"NE","2-5":"SW","4-7":"NW","7-4":"SE",
      };
      return rotateDiagDirection(map[`${ue}-${ux}`], rot);
    }

    function isFatal(r, c, player) {
      if (!inBounds(app.config.size, r, c)) return true;
      const cell = app.board[r][c];
      if (cell.dead) return true;
      if (playerOwnsBaseCell(player, r, c)) return true;
      return false;
    }
    function isOpponentBaseCell(player, r, c) {
      return app.players.some(p => p.id !== player.id && p.baseCells.some(([br, bc]) => br === r && bc === c));
    }

    function eliminatePlayer(player, msg) {
      player.alive = false;
      player.trail = [];
      log(msg);
      app.eliminationQueue.push(player);
    }

    function showNextElimination() {
      if (app.eliminationQueue.length === 0) return;
      const p = app.eliminationQueue.shift();
      el.elimText.textContent = `${p.name} was eliminated!`;
      el.eliminationOverlay.classList.remove("hidden");
    }

    function dismissElimination() {
      el.eliminationOverlay.classList.add("hidden");
      showNextElimination();
      showWinIfReady();
    }

    function showWinIfReady() {
      if (!app.gameOver || app.winner == null || app.winShown) return;
      if (app.eliminationQueue.length > 0) return;
      if (!el.eliminationOverlay.classList.contains("hidden")) return;
      const winner = app.players[app.winner];
      if (!winner) return;
      el.winText.textContent = `${winner.name} Wins!`;
      el.winOverlay.classList.remove("hidden");
      app.winShown = true;
    }

    function dismissWin() {
      el.winOverlay.classList.add("hidden");
    }

    function setWinner(playerId) {
      app.gameOver = true;
      app.winner = playerId;
      app.winShown = true;
      app.pendingFirstPlacement = null;
      app.eliminationQueue = [];
      el.entrySelectWrap.classList.add("hidden");
      el.eliminationOverlay.classList.add("hidden");
      if (app.drag.active) {
        if (app.drag.ghost) app.drag.ghost.remove();
        if (app.drag.hoveredCell) app.drag.hoveredCell.classList.remove("drag-hover");
        app.drag = { active: false, tileType: null, ghost: null, hoveredCell: null };
      }
      const winner = app.players[playerId];
      if (winner) el.winText.textContent = `${winner.name} Wins!`;
      el.winOverlay.classList.remove("hidden");
    }

    function checkPositionDraw() {
      const alive = app.players.filter(p => p.alive && p.row != null);
      for (let i = 0; i < alive.length; i++) {
        for (let j = i + 1; j < alive.length; j++) {
          const a = alive[i], b = alive[j];
          if (a.row === b.row && a.col === b.col && a.entrance === b.entrance) {
            app.gameOver = true;
            app.winner = null;
            log(`Draw: ${a.name} and ${b.name} landed on same position.`);
            return;
          }
        }
      }
    }

    function postTurnAdvance() {
      if (!app.gameOver) {
        let idx = app.currentPlayerIdx;
        for (let i = 0; i < app.players.length; i++) {
          idx = (idx + 1) % app.players.length;
          if (app.players[idx].alive) {
            app.currentPlayerIdx = idx;
            break;
          }
        }
      }
      renderAll();
      showNextElimination();
      showWinIfReady();
    }

    function entranceName(i) { return ["N0","N1","E0","E1","S0","S1","W0","W1"][i]; }
    function entranceHint(i) {
      return [
        "top-left",
        "top-right",
        "right-top",
        "right-bottom",
        "bottom-right",
        "bottom-left",
        "left-bottom",
        "left-top",
      ][i];
    }

    function renderEntryChoices(entries, onPick) {
      el.entrySelectWrap.classList.remove("hidden");
      el.entryRow.innerHTML = "";
      entries.forEach(i => {
        const b = document.createElement("button");
        b.className = "entry-btn";
        b.textContent = `${entranceName(i)} (${entranceHint(i)})`;
        b.onclick = () => {
          if (app.gameOver) return;
          onPick(i);
        };
        el.entryRow.appendChild(b);
      });
    }

    function renderAll() {
      renderHeader();
      renderTiles();
      renderSelectedTilePreview();
      renderBoard();
      renderStatus();
      renderPlayers();
      el.log.textContent = app.logs.join("\n");
    }

    function renderSelectedTilePreview() {
      const p = currentPlayer();
      const tile = { type: app.selectedTile, rot: app.selectedRot };
      let highlightedEntrances = [];
      if (!app.gameOver && p?.alive && !p.hasPlacedFirstTile && app.pendingFirstPlacement) {
        highlightedEntrances = getFirstTurnEntryChoices(
          p,
          app.pendingFirstPlacement.r,
          app.pendingFirstPlacement.c
        );
      }
      el.selectedTilePreview.innerHTML = tileSvg(tile, 116, {
        showEntrances: true,
        showEntranceLabels: true,
        highlightedEntrances,
      });
      el.selectedTileNote.textContent = highlightedEntrances.length
        ? "Green dots are valid entries touching your base."
        : "Dots show all tile entrances.";
    }

    function renderHeader() {
      el.headerChips.innerHTML = "";
      const chips = [
        `Board: ${app.config.size}×${app.config.size}`,
        `Players: ${app.config.playerCount}`,
        `Jump: ${app.config.jumpSelection}${app.config.jumpSelection === "both" ? ` (${app.config.poolMode})` : ""}`,
      ];
      chips.forEach(t => {
        const d = document.createElement("div");
        d.className = "chip";
        d.textContent = t;
        el.headerChips.appendChild(d);
      });
    }

    function tileIsEnabledForSelection(type) {
      if (type !== "jump" && type !== "diagonalJump") return true;
      const js = app.config.jumpSelection;
      if (js === "none") return false;
      if (js === "cardinal") return type === "jump";
      if (js === "diagonal") return type === "diagonalJump";
      return true;
    }

    function renderTiles() {
      el.tileGrid.innerHTML = "";
      const p = currentPlayer();
      const types = Object.keys(TILE_LABELS);
      types.forEach(type => {
        const b = document.createElement("button");
        b.className = "tile-btn" + (app.selectedTile === type ? " selected" : "");
        const enabledByMode = tileIsEnabledForSelection(type);
        const enabledByPool = p && canUseTile(p, type);
        b.disabled = app.gameOver || !enabledByMode || !enabledByPool;
        b.onclick = () => { app.selectedTile = type; renderAll(); };
        b.draggable = false;
        if (!b.disabled) {
          b.onpointerdown = (ev) => {
            if (ev.button !== 0) return;
            onDragStart(type, ev);
          };
        }
        b.innerHTML = `${tileSvg({type, rot:0}, 36)}<div>${TILE_LABELS[type]}</div>`;
        if (type === "jump" || type === "diagonalJump") {
          let remaining = 0;
          if (app.config.jumpSelection === "both" && app.config.poolMode === "combined") remaining = p.combinedJumpLeft;
          else remaining = type === "jump" ? p.jumpLeft : p.diagonalJumpLeft;
          const c = document.createElement("div");
          c.style.fontSize = "11px";
          c.style.color = "#a6c1ff";
          c.textContent = `left: ${remaining}`;
          b.appendChild(c);
        }
        el.tileGrid.appendChild(b);
      });

      el.rotRow.innerHTML = "";
      [0,1,2,3].forEach(rot => {
        const b = document.createElement("button");
        b.className = "rot-btn";
        if (app.selectedRot === rot) b.style.outline = "2px solid #8ab8ff";
        b.textContent = `${rot * 90}°`;
        b.onclick = () => { app.selectedRot = rot; renderAll(); };
        el.rotRow.appendChild(b);
      });
    }

    function renderBoard() {
      const size = app.config.size;
      el.board.style.gridTemplateColumns = `repeat(${size}, ${BOARD_CELL_SIZE}px)`;
      el.board.innerHTML = "";

      const validSet = new Set();
      const p = currentPlayer();
      if (!app.gameOver && p?.alive) {
        if (!p.hasPlacedFirstTile) validFirstTurnCells(p).forEach(([r, c]) => validSet.add(key(r, c)));
        else {
          const one = validSubsequentCell(p);
          if (one) validSet.add(key(one[0], one[1]));
        }
      }

      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const cell = app.board[r][c];
          const btn = document.createElement("button");
          btn.className = "cell";
          if (cell.dead) btn.classList.add("dead");
          if (cell.startOwner != null) {
            btn.classList.add("start", `start-p${cell.startOwner + 1}`);
          }
          btn.dataset.rc = `${r},${c}`;
          if (validSet.has(key(r, c))) btn.classList.add("valid");
          btn.onclick = () => onCellClick(r, c);

          if (cell.tile) {
            btn.innerHTML = `<div class="tile-layer">${tileSvg(cell.tile, BOARD_CELL_SIZE)}</div>`;
          }

          el.board.appendChild(btn);
        }
      }
      renderPlayerTrails();
    }

    function boardPointForTrailPoint(state) {
      const { ax, ay } = state;
      return [
        BOARD_FRAME + state.col * (BOARD_CELL_SIZE + BOARD_CELL_GAP) + ax * BOARD_CELL_SIZE,
        BOARD_FRAME + state.row * (BOARD_CELL_SIZE + BOARD_CELL_GAP) + ay * BOARD_CELL_SIZE,
      ];
    }

    function renderPlayerTrails() {
      const span = app.config.size * BOARD_CELL_SIZE + (app.config.size - 1) * BOARD_CELL_GAP + BOARD_FRAME * 2;
      el.trailLayer.setAttribute("viewBox", `0 0 ${span} ${span}`);
      el.trailLayer.setAttribute("width", `${span}`);
      el.trailLayer.setAttribute("height", `${span}`);
      el.trailLayer.innerHTML = "";

      app.players.forEach(p => {
        if (!p.alive || !p.hasPlacedFirstTile || p.trail.length < 2) return;
        const points = p.trail.map(boardPointForTrailPoint).map(([x, y]) => `${x},${y}`).join(" ");
        const polyline = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        polyline.setAttribute("points", points);
        polyline.setAttribute("fill", "none");
        polyline.setAttribute("stroke", playerColorHex(p.color));
        polyline.setAttribute("stroke-width", "4");
        polyline.setAttribute("stroke-linecap", "round");
        polyline.setAttribute("stroke-linejoin", "round");
        polyline.setAttribute("opacity", "1");

        el.trailLayer.appendChild(polyline);
      });
    }

    function playerColorHex(color) {
      if (color === "p1") return "#ff5a6f";
      if (color === "p2") return "#5aa0ff";
      if (color === "p3") return "#59d37e";
      return "#ffd65a";
    }

    function renderStatus() {
      const p = currentPlayer();
      if (app.gameOver) {
        el.statusText.innerHTML = "Game over.";
        if (app.winner == null) {
          el.winnerText.textContent = "Result: Draw";
        } else {
          el.winnerText.textContent = `Winner: ${app.players[app.winner].name}`;
          showWinIfReady();
        }
        el.winnerText.classList.remove("hidden");
      } else {
        const turnText = p ? `<strong>${p.name}</strong> (${p.color.toUpperCase()})` : "-";
        if (p && !p.hasPlacedFirstTile) {
          const pending = app.pendingFirstPlacement
            ? `Step 2/2: Pick entry for tile at (${app.pendingFirstPlacement.r},${app.pendingFirstPlacement.c})`
            : "Step 1/2: Click any green cell adjacent to your base";
          el.statusText.innerHTML = `Turn: ${turnText}<br>First move: ${pending}`;
        } else {
          el.statusText.innerHTML = `Turn: ${turnText}<br>Phase: Place tile in front of your entrance`;
        }
        el.winnerText.classList.add("hidden");
      }
    }

    function renderPlayers() {
      const lines = app.players.map(p => {
        const life = p.alive ? "alive" : "eliminated";
        const pos = p.row == null ? "at base" : `(${p.row},${p.col}) ${entranceName(p.entrance)}`;
        let jumps = "";
        if (app.config.jumpSelection === "cardinal") jumps = `jump:${p.jumpLeft}`;
        else if (app.config.jumpSelection === "diagonal") jumps = `diag:${p.diagonalJumpLeft}`;
        else if (app.config.jumpSelection === "both") jumps = app.config.poolMode === "combined"
          ? `combined:${p.combinedJumpLeft}` : `jump:${p.jumpLeft}, diag:${p.diagonalJumpLeft}`;
        return `${p.name} — ${life}, ${pos}${jumps ? `, ${jumps}` : ""}`;
      });
      el.playersText.innerHTML = lines.join("<br>");
    }

    function getEdgeForEntrance(i) {
      if (i <= 1) return "N";
      if (i <= 3) return "E";
      if (i <= 5) return "S";
      return "W";
    }

    function uTurnPath(a, b, size) {
      const [x1, y1] = getEntrancePoint(a).map(v => v * size);
      const [x2, y2] = getEntrancePoint(b).map(v => v * size);
      const edge = getEdgeForEntrance(a);
      if (edge === "N") return `M ${x1} ${y1} Q ${(x1 + x2) / 2} ${size * 0.26} ${x2} ${y2}`;
      if (edge === "S") return `M ${x1} ${y1} Q ${(x1 + x2) / 2} ${size * 0.74} ${x2} ${y2}`;
      if (edge === "E") return `M ${x1} ${y1} Q ${size * 0.74} ${(y1 + y2) / 2} ${x2} ${y2}`;
      return `M ${x1} ${y1} Q ${size * 0.26} ${(y1 + y2) / 2} ${x2} ${y2}`;
    }

    function entranceLabelSpec(i, size) {
      const [x, y] = getEntrancePoint(i);
      const edge = getEdgeForEntrance(i);
      const edgeInset = size * 0.09;
      if (edge === "N") return { x: x * size, y: y * size + edgeInset, anchor: "middle" };
      if (edge === "S") return { x: x * size, y: y * size - edgeInset * 0.6, anchor: "middle" };
      if (edge === "E") return { x: x * size - edgeInset * 0.65, y: y * size + size * 0.01, anchor: "end" };
      return { x: x * size + edgeInset * 0.65, y: y * size + size * 0.01, anchor: "start" };
    }

    function tileSvg(tile, size, options = {}) {
      const pairs = getRotatedPairs(tile.type, tile.rot);
      const showEntrances = !!options.showEntrances;
      const showEntranceLabels = !!options.showEntranceLabels;
      const highlightedEntrances = new Set(options.highlightedEntrances || []);
      const lines = pairs.map(([a, b]) => {
        if (tile.type === "uturn") {
          return `<path d="${uTurnPath(a, b, size)}" fill="none" stroke="#d9e8ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>`;
        }
        const [x1, y1] = getEntrancePoint(a);
        const [x2, y2] = getEntrancePoint(b);
        return `<line x1="${x1 * size}" y1="${y1 * size}" x2="${x2 * size}" y2="${y2 * size}" stroke="#d9e8ff" stroke-width="2.2" stroke-linecap="round"/>`;
      }).join("");
      const entranceDots = showEntrances
        ? Array.from({ length: 8 }, (_, i) => {
          const [x, y] = getEntrancePoint(i);
          const fill = highlightedEntrances.has(i) ? "#58e2a9" : "#8fb0df";
          return `<circle cx="${x * size}" cy="${y * size}" r="${size * 0.045}" fill="${fill}" stroke="#0d1730" stroke-width="${Math.max(1.6, size * 0.015)}"/>`;
        }).join("")
        : "";
      const entranceLabels = showEntranceLabels
        ? Array.from({ length: 8 }, (_, i) => {
          const label = entranceName(i);
          const pos = entranceLabelSpec(i, size);
          return `<text x="${pos.x}" y="${pos.y}" text-anchor="${pos.anchor}" font-size="${Math.max(9, size * 0.09)}" font-weight="700" fill="#dce8ff" stroke="#0d1730" stroke-width="${Math.max(0.8, size * 0.01)}" paint-order="stroke">${label}</text>`;
        }).join("")
        : "";
      const jumpCircle = (tile.type === "jump" || tile.type === "diagonalJump")
        ? `<circle cx="${size/2}" cy="${size/2}" r="${size*0.12}" fill="none" stroke="#ffd46b" stroke-width="2.4"/>` : "";
      return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
        ${lines}
        ${entranceDots}
        ${entranceLabels}
        ${jumpCircle}
      </svg>`;
    }

    setupBindings();
    renderTutorialCard();
    el.bothPoolField.classList.toggle("hidden", el.jumpSelection.value !== "both");
  </script>
</body>
</html>
